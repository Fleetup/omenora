<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="48%" r="70%">
      <stop offset="0%" stop-color="#0d0820"/>
      <stop offset="100%" stop-color="#050410"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8c6eff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8c6eff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Nebula glow -->
  <ellipse cx="600" cy="300" rx="520" ry="380" fill="url(#glow)"/>
  <ellipse cx="600" cy="310" rx="280" ry="200" fill="url(#goldglow)"/>

  <!-- Stars -->
  <circle cx="98" cy="72" r="1.5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="182" cy="145" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="310" cy="48" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="445" cy="112" r="1" fill="rgba(255,255,255,0.35)"/>
  <circle cx="760" cy="68" r="1.5" fill="rgba(255,255,255,0.55)"/>
  <circle cx="890" cy="140" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="1050" cy="55" r="2" fill="rgba(255,255,255,0.6)"/>
  <circle cx="1120" cy="180" r="1" fill="rgba(255,255,255,0.35)"/>
  <circle cx="72" cy="480" r="1.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="200" cy="530" r="1" fill="rgba(255,255,255,0.3)"/>
  <circle cx="980" cy="520" r="1.5" fill="rgba(255,255,255,0.45)"/>
  <circle cx="1140" cy="440" r="1" fill="rgba(200,180,255,0.5)"/>
  <circle cx="550" cy="88" r="1" fill="rgba(201,168,76,0.6)"/>
  <circle cx="640" cy="520" r="1" fill="rgba(201,168,76,0.4)"/>

  <!-- Orbital mark -->
  <g transform="translate(600,228)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="62" fill="none" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="rgba(140,110,255,0.22)" stroke-width="1"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="7" fill="rgba(200,180,255,0.9)"/>
    <circle cx="0" cy="0" r="7" fill="none" stroke="rgba(180,150,255,0.4)" stroke-width="4"/>
    <!-- Planet on outer ring -->
    <circle cx="0" cy="-62" r="5" fill="rgba(201,168,76,0.9)"/>
    <circle cx="0" cy="-62" r="5" fill="none" stroke="rgba(201,168,76,0.4)" stroke-width="3"/>
  </g>

  <!-- Brand name -->
  <text x="600" y="350" font-family="Georgia, serif" font-size="72" font-weight="300"
        letter-spacing="18" text-anchor="middle" fill="rgba(255,255,255,0.93)">OMENORA</text>

  <!-- Tagline -->
  <text x="600" y="404" font-family="Georgia, serif" font-size="20" font-style="italic"
        font-weight="300" letter-spacing="0.5" text-anchor="middle" fill="rgba(255,255,255,0.42)">
    AI decoded your destiny. Science explains why.
  </text>

  <!-- Divider line + social proof -->
  <line x1="420" y1="438" x2="540" y2="438" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>
  <text x="600" y="442" font-family="Arial, sans-serif" font-size="11" letter-spacing="2.5"
        text-anchor="middle" fill="rgba(201,168,76,0.6)">3.9M ANALYSES COMPLETE</text>
  <line x1="660" y1="438" x2="780" y2="438" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>

  <!-- Feature pills row -->
  <text x="330" y="500" font-family="Arial, sans-serif" font-size="11" letter-spacing="1.5"
        text-anchor="middle" fill="rgba(255,255,255,0.25)">AI BIRTH CHART</text>
  <text x="490" y="500" font-family="Arial, sans-serif" font-size="11" letter-spacing="1.5"
        text-anchor="middle" fill="rgba(255,255,255,0.25)">NUMEROLOGY</text>
  <text x="652" y="500" font-family="Arial, sans-serif" font-size="11" letter-spacing="1.5"
        text-anchor="middle" fill="rgba(255,255,255,0.25)">COMPATIBILITY</text>
  <text x="836" y="500" font-family="Arial, sans-serif" font-size="11" letter-spacing="1.5"
        text-anchor="middle" fill="rgba(255,255,255,0.25)">2026 FORECAST</text>

  <!-- Separator dots between pills -->
  <circle cx="410" cy="496" r="1.5" fill="rgba(201,168,76,0.3)"/>
  <circle cx="574" cy="496" r="1.5" fill="rgba(201,168,76,0.3)"/>
  <circle cx="740" cy="496" r="1.5" fill="rgba(201,168,76,0.3)"/>

  <!-- Bottom domain -->
  <text x="600" y="578" font-family="Arial, sans-serif" font-size="14" letter-spacing="3"
        text-anchor="middle" fill="rgba(255,255,255,0.15)">OMENORA.COM</text>
</svg>
