name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: augur/package-lock.json

      - name: Install dependencies
        run: cd augur && npm ci

      - name: Run ESLint
        run: cd augur && npm run lint

      - name: Run TypeScript type check
        run: cd augur && npm run typecheck

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: augur/package-lock.json

      - name: Install dependencies
        run: cd augur && npm ci

      - name: Run unit tests
        run: cd augur && npm run test

  e2e-test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: augur/package-lock.json

      - name: Install dependencies
        run: cd augur && npm ci

      - name: Install Playwright Browsers
        run: cd augur && npx playwright install --with-deps

      - name: Run Playwright tests
        run: cd augur && npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: augur/playwright-report/
          retention-days: 30

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: augur/package-lock.json

      - name: Install dependencies
        run: cd augur && npm ci

      - name: Build application
        run: cd augur && npm run build
        env:
          NUXT_PUBLIC_SITE_URL: ${{ vars.NUXT_PUBLIC_SITE_URL }}
          NUXT_PUBLIC_STRIPE_KEY: ${{ secrets.NUXT_PUBLIC_STRIPE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: augur/.output/
          retention-days: 7
